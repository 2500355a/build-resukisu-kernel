name: Build GKI Kernel (Official Way)

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: '内核分支'
        required: true
        default: 'android13-5.15'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make gcc flex bison \
            libncurses-dev libssl-dev python3 libelf-dev bc cpio \
            kmod liblz4-tool libzstd-dev zlib1g-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu lld llvm clang dwarves
      
      - name: Clone kernel source
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/common -b ${{ github.event.inputs.KERNEL_BRANCH }}
          cd common
          
      - name: Configure kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LD=ld.lld gki_defconfig
          make ARCH=arm64 CC=clang LD=ld.lld olddefconfig
          
      - name: Build kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 -j$(nproc) Image
          
      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: common/arch/arm64/boot/Image