name: Build Xiaomi 13 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make gcc flex bison \
            libncurses-dev libssl-dev python3 libelf-dev bc cpio \
            kmod liblz4-tool libzstd-dev zlib1g-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            lld llvm clang dwarves
      
      - name: Clone Xiaomi 13 kernel source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b fuxi-t-oss
          
      - name: Apply ReSukiSU (optional)
        run: |
          cd Xiaomi_Kernel_OpenSource
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
      - name: Configure kernel
        run: |
          cd Xiaomi_Kernel_OpenSource
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LD=ld.lld
          
          # 小米13的配置
          make vendor/fuxi_defconfig
          
      - name: Build kernel
        run: |
          cd Xiaomi_Kernel_OpenSource
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          
          make -j$(nproc) Image
          
      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi13-kernel-${{ github.run_id }}
          path: Xiaomi_Kernel_OpenSource/arch/arm64/boot/Image