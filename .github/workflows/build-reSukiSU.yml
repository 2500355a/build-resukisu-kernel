name: Build Xiaomi 13 Kernel

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: '内核分支'
        required: true
        default: 'fuxi-t-oss'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make gcc flex bison \
            libncurses-dev libssl-dev python3 libelf-dev bc cpio \
            kmod liblz4-tool libzstd-dev zlib1g-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            lld llvm clang dwarves
      
      - name: Clone Xiaomi 13 kernel source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b ${{ github.event.inputs.KERNEL_BRANCH }}
          
      - name: Clone device tree
        run: |
          git clone --depth=1 https://github.com/MiCode/kernel_devicetree.git -b ${{ github.event.inputs.KERNEL_BRANCH }}
          cp -r kernel_devicetree/* Xiaomi_Kernel_OpenSource/ 2>/dev/null || true
          
      - name: Configure kernel
        run: |
          cd Xiaomi_Kernel_OpenSource
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LD=ld.lld
          
          # 小米13是GKI设备，直接用gki_defconfig
          make gki_defconfig
          # 加个本地版本标识
          echo "CONFIG_LOCALVERSION=\"-fuxi\"" >> .config
          
      - name: Build kernel
        run: |
          cd Xiaomi_Kernel_OpenSource
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          
          make -j$(nproc) Image
          
      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi13-kernel-${{ github.run_id }}
          path: Xiaomi_Kernel_OpenSource/arch/arm64/boot/Image
          
      - name: Upload dtb if exists
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi13-dtb-${{ github.run_id }}
          path: Xiaomi_Kernel_OpenSource/arch/arm64/boot/dts/
          if-no-files-found: ignore