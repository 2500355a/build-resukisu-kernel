name: Build ReSukiSU Kernel

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: '内核分支'
        required: true
        default: 'android13-5.15'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl make gcc flex bison \
            libncurses-dev libssl-dev python3 libelf-dev bc cpio \
            kmod liblz4-tool libzstd-dev zlib1g-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu lld llvm clang
      
      - name: Clone kernel source
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/common -b ${{ github.event.inputs.KERNEL_BRANCH }}
          cd common
          
      - name: Apply ReSukiSU
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
      - name: Apply SUSFS patches
        continue-on-error: true
        run: |
          cd common
          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git
          cp kernel_patches/wild/susfs_fix_patches/v2.0.0/50_add_susfs_in_gki-android13-5.15.patch ./
          patch -p1 < 50_add_susfs_in_gki-android13-5.15.patch
          
      - name: Configure kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LD=ld.lld gki_defconfig
          echo "CONFIG_KSU=y" >> .config
          echo "CONFIG_OVERLAY_FS=y" >> .config
          echo "CONFIG_KSU_SUSFS=y" >> .config
          make ARCH=arm64 CC=clang LD=ld.lld olddefconfig
          
      - name: Build kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 -j$(nproc) Image
          
      - name: Create AnyKernel3 package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cp common/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do\./title=ReSukiSU Kernel\n/g' anykernel.sh
          zip -r9 ../kernel.zip *
          
      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel
          path: kernel.zip