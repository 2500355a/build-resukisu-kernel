name: Build Xiaomi 13 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git wget curl make gcc flex bison \
            libncurses5-dev libssl-dev python3 libelf-dev bc cpio \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang lld-14 llvm-14 dwarves
          sudo ln -sf /usr/bin/lld-14 /usr/local/bin/lld
          sudo ln -sf /usr/bin/ld.lld-14 /usr/local/bin/ld.lld
      
      - name: Clone kernel
        run: git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b fuxi-t-oss
          
      - name: Apply ReSukiSU
        run: |
          cd Xiaomi_Kernel_OpenSource
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
      - name: Fix hwid
        run: |
          cd Xiaomi_Kernel_OpenSource
          mkdir -p drivers/misc/hwid
          echo 'config HWID' > drivers/misc/hwid/Kconfig
          echo '    bool "HWID support"' >> drivers/misc/hwid/Kconfig
          echo '    default y' >> drivers/misc/hwid/Kconfig
          
      - name: Configure
        run: |
          cd Xiaomi_Kernel_OpenSource
          export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld
          make gki_defconfig
          echo "CONFIG_DEBUG_INFO_BTF=n" >> .config
          make olddefconfig
          
      - name: Build
        run: |
          cd Xiaomi_Kernel_OpenSource
          export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1
          make -j$(nproc) Image || true
          if [ -f arch/arm64/boot/Image ]; then
            echo "✅ Success: $(ls -lh arch/arm64/boot/Image)"
          else
            echo "❌ Failed"
            exit 1
          fi
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi13-kernel
          path: Xiaomi_Kernel_OpenSource/arch/arm64/boot/Image