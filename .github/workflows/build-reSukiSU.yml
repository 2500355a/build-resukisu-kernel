name: Prepare Kernel Source with ReSukiSU and SUSFS

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'AOSP 内核分支'
        required: true
        default: 'android13-5.15'

jobs:
  prepare:
    name: Prepare Kernel Source
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget

      - name: Clone AOSP GKI Kernel Source
        run: |
          mkdir kernel-source
          cd kernel-source
          git clone --depth=1 https://android.googlesource.com/kernel/common -b ${{ github.event.inputs.KERNEL_BRANCH }}

      - name: Integrate ReSukiSU
        run: |
          cd kernel-source/common
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: Apply WildKernels SUSFS Patches
        continue-on-error: true
        run: |
          cd kernel-source/common
          # 🔥 这里改动了：用 WildKernels 的补丁，不是版本号
          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git
          cp kernel_patches/wild/susfs_fix_patches/v2.0.0/a13-5.15/*.patch ./
          
          echo "▶️ 应用 namespace.c.patch ..."
          patch -p1 < namespace.c.patch || echo "namespace.c.patch 应用失败"
          
          echo "▶️ 应用 fdinfo.c.patch ..."
          patch -p1 < fdinfo.c.patch || echo "fdinfo.c.patch 应用失败"
          
          echo "▶️ 应用 open.c.patch ..."
          patch -p1 < open.c.patch || echo "open.c.patch 应用失败"
          
          # 3. 手动修改 fs/susfs.c
          echo "▶️ 修改 fs/susfs.c ..."
          sed -i 's|is_i_uid_not_allowed(i_uid_into_mnt(i_user_ns(inode), inode).val)))|is_i_uid_not_allowed(inode->i_uid.val)))|g' fs/susfs.c || echo "susfs.c 修改失败"
          
          # 4. 修改 task_mmu.c
          echo "▶️ 修改 fs/proc/task_mmu.c ..."
          sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c || echo "task_mmu.c 修改失败"

      - name: Generate defconfig fragment
        run: |
          cd kernel-source/common
          cat > wild_gki.fragment << 'EOF'
CONFIG_KSU=y
CONFIG_KSU_MANUAL_HOOK=y
CONFIG_OVERLAY_FS=y
CONFIG_OVERLAY_FS_REDIRECT_DIR=y
CONFIG_OVERLAY_FS_INDEX=y
CONFIG_OVERLAY_FS_XATTR=y
CONFIG_OVERLAY_FS_METACOPY=y
CONFIG_EXT4_FS=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_EXT4_FS_SECURITY=y
CONFIG_SECURITY_SELINUX=y
CONFIG_SECURITY_SELINUX_DEVELOP=y
CONFIG_KSU_SUSFS=y
CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
CONFIG_KSU_SUSFS_SUS_PATH=y
CONFIG_KSU_SUSFS_SUS_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
CONFIG_KSU_SUSFS_SUS_KSTAT=y
CONFIG_KSU_SUSFS_TRY_UMOUNT=y
CONFIG_KSU_SUSFS_SPOOF_UNAME=y
CONFIG_KSU_SUSFS_ENABLE_LOG=y
CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
EOF

      - name: Upload kernel source as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-source-${{ github.run_id }}
          path: kernel-source/
          compression-level: 9