name: Build ReSukiSU GKI Kernel from AOSP Source

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'AOSP 内核分支'
        required: true
        default: 'android13-5.15'

jobs:
  build:
    name: Build Kernel with ReSukiSU
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git repo curl wget make gcc flex bison libncurses-dev libssl-dev python3

      - name: Clone AOSP GKI Kernel Source
        run: |
          mkdir kernel-source
          cd kernel-source
          git clone --depth=1 https://android.googlesource.com/kernel/common -b ${{ github.event.inputs.KERNEL_BRANCH }}

      - name: Integrate ReSukiSU (Core Step)
        run: |
          cd kernel-source/common
          echo "🔥 执行 ReSukiSU 集成脚本..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          echo "✅ ReSukiSU 集成完成"

      - name: Apply WildKernels SUSFS Patches (for 5.15)
        continue-on-error: true
        run: |
          cd kernel-source/common
          echo "🔥 拉取 WildKernels 的 SUSFS 补丁 ..."
          
          # 1. 拉取 WildKernels 的 kernel_patches 仓库
          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git
          
          # 2. 应用 5.15 内核的三个补丁
          cp kernel_patches/wild/susfs_fix_patches/v2.0.0/a13-5.15/*.patch ./
          
          echo "▶️ 应用 namespace.c.patch ..."
          patch -p1 < namespace.c.patch || echo "namespace.c.patch 应用失败"
          
          echo "▶️ 应用 fdinfo.c.patch ..."
          patch -p1 < fdinfo.c.patch || echo "fdinfo.c.patch 应用失败"
          
          echo "▶️ 应用 open.c.patch ..."
          patch -p1 < open.c.patch || echo "open.c.patch 应用失败"
          
          # 3. 手动修改 fs/susfs.c
          echo "▶️ 修改 fs/susfs.c ..."
          sed -i 's|is_i_uid_not_allowed(i_uid_into_mnt(i_user_ns(inode), inode).val)))|is_i_uid_not_allowed(inode->i_uid.val)))|g' fs/susfs.c || echo "susfs.c 修改失败"
          
          # 4. 修改 task_mmu.c
          echo "▶️ 修改 fs/proc/task_mmu.c ..."
          sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c || echo "task_mmu.c 修改失败"
          
          cd ../..
          echo "✅ WildKernels SUSFS 补丁应用完成"

      - name: Setup Clang Toolchain
        run: |
          mkdir toolchain
          cd toolchain
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784e.tar.gz
          tar -xzf clang-r450784e.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Configure Kernel 🔥
        run: |
          cd kernel-source/common
          make ARCH=arm64 CC=clang LD=ld.lld gki_defconfig
          
          # KernelSU 基础
          echo "CONFIG_KSU=y" >> .config
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> .config
          
          # 🔥 OverlayFS 全开（小米平板6 Pro的配置）
          echo "CONFIG_OVERLAY_FS=y" >> .config
          echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y" >> .config
          echo "CONFIG_OVERLAY_FS_INDEX=y" >> .config
          echo "CONFIG_OVERLAY_FS_XATTR=y" >> .config
          echo "CONFIG_OVERLAY_FS_METACOPY=y" >> .config
          
          # 文件系统权限相关（MT管理器直接修改的关键）
          echo "CONFIG_EXT4_FS=y" >> .config
          echo "CONFIG_EXT4_FS_POSIX_ACL=y" >> .config
          echo "CONFIG_EXT4_FS_SECURITY=y" >> .config
          
          # SELinux 支持（Android必须）
          echo "CONFIG_SECURITY_SELINUX=y" >> .config
          echo "CONFIG_SECURITY_SELINUX_DEVELOP=y" >> .config
          
          # SUSFS 配置选项（从 WildKernels 来的）
          echo "CONFIG_KSU_SUSFS=y" >> .config
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> .config
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> .config
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> .config
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> .config
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> .config
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> .config
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> .config
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> .config
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> .config
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> .config
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> .config
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> .config
          
          echo "✅ 内核配置完成"

      - name: Build Kernel
        run: |
          cd kernel-source/common
          make ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 -j$(nproc) Image
          if [ ! -f arch/arm64/boot/Image ]; then
            tools/bazel build --config=fast //common:kernel_aarch64_dist
            cp bazel-bin/common/kernel_aarch64_dist/Image arch/arm64/boot/Image || true
          fi

      - name: Create AnyKernel3 Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cp kernel-source/common/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do\./title=ReSukiSU Kernel\n/g' anykernel.sh
          zip -r9 ../ReSukiSU-GKI-${{ github.event.inputs.KERNEL_BRANCH }}.zip * -x .git README.md
          cd ..

      - name: Upload Kernel Package
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel-${{ github.event.inputs.KERNEL_BRANCH }}
          path: ReSukiSU-GKI-*.zip